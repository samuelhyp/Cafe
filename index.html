<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Caffé Crema | Authentic Italian Restaurant & Café Frankfurt</title>

<meta name="description" content="Discover authentic Italian cuisine, premium coffee, fresh pastries and outdoor dining at Caffé Crema in Frankfurt.">

<meta name="keywords" content="Italian Restaurant Frankfurt, Coffee Shop Frankfurt, Caffé Crema, Italian Food Germany">

<meta name="theme-color" content="#3b2417">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

:root{
--primary:#3b2417;
--secondary:#c9a46a;
--light:#faf7f2;
--white:#ffffff;
--dark:#151515;
--gray:#666;
--shadow:0 15px 40px rgba(0,0,0,.12);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
overflow-x:hidden;
}

body{
font-family:'Poppins',sans-serif;
background:var(--light);
color:#222;
overflow-x:hidden;
}

img{
max-width:100%;
display:block;
}

a{
text-decoration:none;
}

.container{
width:90%;
max-width:1280px;
margin:auto;
}

section{
padding:100px 0;
}

.section-title{
font-family:'Playfair Display',serif;
font-size:3rem;
margin-bottom:20px;
color:var(--primary);
}

.section-subtitle{
color:#777;
max-width:700px;
margin:auto;
line-height:1.8;
}

/* NAVIGATION */

header{
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;
background:rgba(0,0,0,.55);
backdrop-filter:blur(10px);
transition:.4s;
}

.navbar{
height:85px;
display:flex;
align-items:center;
justify-content:space-between;
}

.logo{
font-family:'Playfair Display',serif;
font-size:2rem;
font-weight:700;
color:white;
}

.logo span{
color:var(--secondary);
}

.nav-links{
display:flex;
gap:35px;
}

.nav-links a{
color:white;
font-weight:500;
position:relative;
}

.nav-links a::after{
content:'';
position:absolute;
bottom:-5px;
left:0;
width:0;
height:2px;
background:var(--secondary);
transition:.3s;
}

.nav-links a:hover::after{
width:100%;
}

.book-btn{
background:var(--secondary);
color:white;
padding:13px 24px;
border-radius:50px;
font-weight:600;
transition:.3s;
}

.book-btn:hover{
transform:translateY(-3px);
}

.mobile-menu{
display:none;
font-size:1.8rem;
color:white;
cursor:pointer;
}

/* HERO */

.hero{
height:100vh;
background:
linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
url('https://images.unsplash.com/photo-1554118811-1e0d58224f24?auto=format&fit=crop&w=2000&q=80');
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
}

.hero-content{
max-width:900px;
padding:20px;
color:white;
animation:fadeUp 1.2s ease;
}

.hero-tag{
display:inline-block;
padding:10px 20px;
border:1px solid rgba(255,255,255,.3);
border-radius:40px;
margin-bottom:25px;
font-size:.9rem;
backdrop-filter:blur(10px);
}

.hero h1{
font-family:'Playfair Display',serif;
font-size:5rem;
line-height:1.1;
margin-bottom:25px;
}

.hero p{
font-size:1.15rem;
max-width:700px;
margin:auto;
line-height:1.9;
margin-bottom:40px;
}

.hero-buttons{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.btn{
padding:16px 34px;
border-radius:50px;
font-weight:600;
transition:.3s;
display:inline-block;
}

.btn-primary{
background:var(--secondary);
color:white;
}

.btn-primary:hover{
transform:translateY(-4px);
}

.btn-secondary{
border:2px solid white;
color:white;
}

.btn-secondary:hover{
background:white;
color:black;
}

.hero-badge{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
background:white;
padding:18px 28px;
border-radius:60px;
box-shadow:var(--shadow);
display:flex;
gap:15px;
align-items:center;
font-weight:600;
}

.hero-badge i{
color:#f7b500;
}

/* ABOUT */

.about{
background:white;
}

.about-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:70px;
align-items:center;
}

.about-image{
position:relative;
}

.about-image img{
border-radius:25px;
box-shadow:var(--shadow);
}

.floating-card{
position:absolute;
bottom:-30px;
right:-20px;
background:white;
padding:25px;
border-radius:20px;
box-shadow:var(--shadow);
text-align:center;
}

.floating-card h3{
color:var(--secondary);
font-size:2rem;
}

.about-content p{
margin-bottom:20px;
line-height:1.9;
color:#666;
}

.about-features{
margin-top:30px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
}

.feature-item{
display:flex;
gap:15px;
align-items:flex-start;
}

.feature-item i{
color:var(--secondary);
font-size:1.3rem;
margin-top:5px;
}

.feature-item h4{
margin-bottom:5px;
}

/* STATS */

.stats{
background:var(--primary);
color:white;
}

.stats-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:30px;
text-align:center;
}

.stat h2{
font-size:3rem;
color:var(--secondary);
margin-bottom:10px;
}

.stat p{
opacity:.9;
}

/* MENU */

.menu{
background:#f9f7f3;
text-align:center;
}

.menu-grid{
margin-top:60px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
}

.menu-card{
background:white;
border-radius:25px;
overflow:hidden;
box-shadow:var(--shadow);
transition:.4s;
}

.menu-card:hover{
transform:translateY(-10px);
}

.menu-card img{
height:240px;
width:100%;
object-fit:cover;
}

.menu-content{
padding:25px;
}

.menu-content h3{
font-family:'Playfair Display',serif;
font-size:1.7rem;
margin-bottom:10px;
}

.price{
color:var(--secondary);
font-weight:700;
font-size:1.2rem;
margin-top:15px;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}
